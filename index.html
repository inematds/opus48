<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório · Claude Opus 4.8</title>
  <style>
    :root{--bg:#0f0e0c;--card:#1a1815;--ink:#f5f1ea;--mut:#a39e94;--acc:#d97757;--line:#2a2723}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--ink);font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
    .wrap{max-width:760px;margin:0 auto;padding:80px 24px}
    .tag{display:inline-block;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);border:1px solid var(--line);border-radius:999px;padding:5px 12px;margin-bottom:24px}
    h1{font-size:clamp(32px,6vw,52px);line-height:1.1;letter-spacing:-.02em;margin-bottom:16px}
    .sub{color:var(--mut);font-size:18px;max-width:60ch}
    .status{margin-top:48px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px}
    .status h2{font-size:14px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:12px}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--acc);margin-right:8px;animation:p 1.6s infinite}
    @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
    footer{margin-top:64px;color:var(--mut);font-size:13px;border-top:1px solid var(--line);padding-top:24px}
    a{color:var(--acc)}
  </style>
</head>
<body>
  <div class="wrap">
    <span class="tag">Anthropic · Relatório de Pesquisa</span>
    <h1>Claude Opus 4.8</h1>
    <p class="sub">Relatório completo sobre o lançamento — novidades, benchmarks, preços e comparações.</p>
    <div class="status">
      <h2>Status</h2>
      <p><span class="dot"></span>Pesquisa multi-fonte em andamento. O relatório final será publicado aqui em instantes.</p>
    </div>
    <footer>
      Gerado via deep-research · <a href="https://github.com/inematds/opus48">github.com/inematds/opus48</a>
    </footer>
  </div>
</body>
</html>
